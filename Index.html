<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css" />
  <script src="main.js" defer></script>
</head>

<body>
  <main class="container">
    <h1>To-Do List</h1>

    <div class="input-container">
      <input type="text" id="todoInput" placeholder="Aggiungi un nuovo elemento..." aria-label="Nuovo task" />
      <button id="addBtn" type="button">Aggiungi</button>
    </div>

    <ul id="todoList" aria-label="Lista task"></ul>
  </main>
</body>

</html>
